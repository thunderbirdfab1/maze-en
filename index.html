<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mist Tracking: Underground Treasure Hunt</title>
  <style>
    /* 【优化4】字体注册：SourceHanSansSC.otf（思源黑体） */
    @font-face {
      font-family: 'SourceHanSans';
      src: url('SourceHanSansSC.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    * { box-sizing: border-box; }
    body, html { margin: 0; min-height: 100vh; font-family: 'SourceHanSans', "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: #04323b url('images/background.jpg') center center / cover no-repeat; color: #e8f8ff; }
    /* 背景图在此处修改：images/background.jpg */
    body::before { content: ''; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); /* 背景遮罩透明度 40%，可根据需要调整 */ pointer-events: none; }
    body { display: flex; align-items: center; justify-content: center; }
    .screen { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 2; }
    /* 【优化1】开始/结束界面背景图：images/background.jpg（复用游戏背景图） */
    .start-screen, .end-screen {
      background: url('images/background.jpg') center center / cover no-repeat;
    }
    .start-screen::before, .end-screen::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.5); /* 遮罩透明度 50%，保证文字可读 */
      pointer-events: none;
    }
    .start-screen > *, .end-screen > * { position: relative; z-index: 1; }
    .game-screen { background: transparent; }
    .hidden { display: none; }
    .end-screen h1 { font-size: clamp(2rem, 6vw, 4rem); margin-top: -40px; margin-bottom: 18px; }
    #totalTimeDisplay { font-size: clamp(1.2rem, 3.5vw, 1.8rem); font-weight: 700; color: #f5e7a8; margin: 8px 0 10px; }
    .screenshot-hint { font-size: clamp(1rem, 2.8vw, 1.35rem); font-weight: 700; color: #b9e7ff; margin: 10px 0 22px; text-align: center; max-width: 480px; line-height: 1.5; }
    /* 【优化3】结束界面 Discord 按钮：images/btn_discord.png */
    .end-screen button { border: none; outline: none; cursor: pointer; background: none; padding: 0; box-shadow: none; }
    .end-screen button img { display: block; width: 220px; height: auto; transition: transform 0.2s; }
    .end-screen button:hover img { transform: translateY(-3px); }
    /* 开始界面主标题字号（手机/PC） */
    h1 { font-size: clamp(1.8rem, 6vw, 4rem); letter-spacing: 0.2em; margin-bottom: 10px; }
    /* 开始界面副标题字号（手机/PC） */
    h2 { font-size: clamp(0.9rem, 2.2vw, 1.6rem); color: #b9e7ff; margin-bottom: 30px; }
    /* 【优化3】开始按钮：images/btn_start.png */
    button { border: none; outline: none; cursor: pointer; background: none; padding: 0; box-shadow: none; }
    button img { display: block; transition: transform 0.2s; }
    button:hover img { transform: translateY(-3px); }
    #startButton img { width: 200px; height: auto; /* 开始按钮图片宽度，可按需微调 */ }
    #startButton { margin-top: 40px; /* 开始按钮下移距离，可按需微调 */ }
    /* 【优化2】开始界面标题上移 + 动态宝箱 */
    .start-screen { justify-content: flex-start; padding-top: 8vh; }
    .chest-wrapper {
      margin-top: 20px;
      cursor: pointer;
      position: relative;
    }
    /* 宝箱图片：images/chest_closed.png（关闭）、images/chest_open.png（打开） */
    /* 宝箱尺寸：宽 200px，可按需微调 */
    .chest-wrapper img {
      width: 400px;
      height: auto;
      display: block;
      transition: filter 0.3s;
    }
    .chest-wrapper .chest-open { display: none; }
    .chest-wrapper:hover .chest-closed { display: none; }
    .chest-wrapper:hover .chest-open { display: block; }
    /* 悬停震动动画：幅度 3px，频率 0.15s */
    .chest-wrapper:hover {
      animation: chestShake 0.15s ease-in-out infinite alternate;
    }
    .chest-wrapper:hover img {
      filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.45)) drop-shadow(0 0 70px rgba(255, 180, 0, 0.25));
      /* 发光效果参数（可按需微调）：
         内层光晕：半径 35px，透明度 0.45
         外层光晕：半径 70px，透明度 0.25 */
    }
    @keyframes chestShake {
      0%   { transform: translate(-3px, 0) rotate(-1deg); }
      100% { transform: translate(3px, 0) rotate(1deg); }
    }
    .timer-display {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 10px 16px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: #f9f9f9;
      /* 关卡和倒计时字号（手机/PC） */
      font-size: clamp(0.8rem, 2.5vw, 1.2rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      box-shadow: 0 12px 18px rgba(0,0,0,0.35);
      z-index: 6;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 5;
    }
    .overlay.hidden { display: none; }
    /* 【优化1/2】提示弹窗图片统一样式 */
    /* 弹窗图片尺寸：宽 300px（约为原来的 15%），可按需微调 */
    .tip-popup-img {
      width: 300px;
      height: auto;
      display: none;
    }
    /* 失败弹窗的 restart 按钮定位 */
    #messageOverlay {
      flex-direction: column;
    }
    #messageOverlay #restartButton {
      margin-top: 20px;
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      background: #d22f34;
      color: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(210, 47, 52, 0.35);
    }
    #messageOverlay #restartButton:hover {
      transform: translateY(-2px);
    }
    .overlay-box {
      padding: 24px 32px;
      border-radius: 20px;
      background: rgba(4, 40, 54, 0.95);
      border: 2px solid #3b8fa4;
      text-align: center;
      min-width: 320px;
    }
    .overlay-box p { margin: 0 0 18px; /* 弹窗文字字号（手机/PC） */ font-size: clamp(1rem, 3vw, 1.4rem); color: #f4f8ff; }
    .overlay-box button {
      width: 100%;
      max-width: 220px;
      padding: 14px 18px;
      border-radius: 999px;
      background: #d22f34;
      color: #fff;
      /* 按钮文字字号（手机/PC） */
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      font-weight: 700;
    }
    #gameCanvas { width: min(90vw, 1280px); height: auto; border-radius: 16px; background: #04242f; box-shadow: 0 20px 40px rgba(0,0,0,0.35); position: relative; z-index: 2; touch-action: none; }
    @media (max-width: 768px) {
      #gameCanvas { max-width: none !important; }
    }
    #rainCanvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
    /* 手机端适配：禁止页面滚动和缩放 */
    html, body { overflow: hidden; touch-action: manipulation; }
    .game-screen { touch-action: none; }
    /* 弹窗图片手机适配：手机端缩小弹窗，避免溢出 */
    /* 弹窗图片尺寸 PC端 width: 300px（不变，见第108行） */
    /* 弹窗图片尺寸 手机端 width: 220px（可微调这个数值） */
    @media (max-width: 768px) {
      .tip-popup-img {
        width: 220px;
      }
    }
  </style>
</head>
<body>
  <canvas id="rainCanvas"></canvas>

  <div class="screen start-screen" id="startScreen">
    <!-- 开始界面标题文字 -->
    <h1>Mist Tracking</h1>
    <!-- 开始界面副标题文字 -->
    <h2>Underground Treasure Hunt</h2>
    <!-- 【优化2】动态宝箱：关闭图 chest_closed.png / 打开图 chest_open.png，尺寸 200px -->
    <div class="chest-wrapper">
      <img class="chest-closed" src="images/chest_closed.png" alt="宝箱关闭" />
      <img class="chest-open" src="images/chest_open.png" alt="宝箱打开" />
    </div>
    <!-- 【优化3】开始按钮图片：images/btn_start.png -->
    <button id="startButton"><img src="images/btn_start.png" alt="开始" /></button>
  </div>

  <div class="screen game-screen hidden" id="gameScreen">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="timer-display" id="timerDisplay">
      <!-- 关卡显示文字 -->
      <span id="levelDisplay">Level 1</span>
      <br />
      <!-- 倒计时显示文字 -->
      <span id="timeValue">30 s until darkness...</span>
    </div>
    <div class="overlay hidden" id="messageOverlay">
      <!-- 【优化1】失败提示图片：images/fail_popup.png -->
      <img id="failImage" class="tip-popup-img" src="images/fail_popup.png" alt="挑战失败" />
      <div class="overlay-box" id="failBox">
        <!-- 失败提示文字 -->
        <p id="messageText">Challenge Failed</p>
      </div>
      <!-- 重新开始按钮文字 -->
      <button id="restartButton">Restart</button>
    </div>
    <div class="overlay hidden" id="tipOverlay">
      <!-- 【优化1】通关提示图片：images/win_popup.png -->
      <img id="tipImageWin" class="tip-popup-img" src="images/win_popup.png" alt="通关提示" />
      <!-- 【优化2】找到宝藏提示图片：images/found_treasure.png -->
      <img id="tipImageFound" class="tip-popup-img" src="images/found_treasure.png" alt="找到宝藏" />
      <!-- 【优化2】未找到宝藏提示图片：images/no_treasure.png -->
      <img id="tipImageNoTreasure" class="tip-popup-img" src="images/no_treasure.png" alt="未找到宝藏" />
      <div class="overlay-box" id="tipBox">
        <p id="tipText"></p>
      </div>
    </div>
  </div>

  <div class="screen end-screen hidden" id="endScreen">
    <!-- 结束界面标题文字 -->
    <h1>Maze Escaped!</h1>
    <!-- 结束界面总用时文字 -->
    <p id="totalTimeDisplay">Total Time: 0 min 0 s</p>
    <!-- 截图提示文字 -->
    <p class="screenshot-hint">📸 Take a screenshot and share your success through the button below👇</p>
    <!-- 【优化3】Discord 按钮图片：images/btn_discord.png -->
    <button id="discordButton"><img src="images/btn_discord.png" alt="返回 Discord" /></button>
  </div>

  <script>
    const startButton = document.getElementById('startButton');
    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const rainCanvas = document.getElementById('rainCanvas');
    const rainCtx = rainCanvas.getContext('2d');

    let TILE_SIZE = 25; /* 迷宫格子像素大小（动态计算，此为默认值），可根据需求微调 */
    const TILE_SIZE_MIN = 20; /* 格子最小值（手机小屏保底） */
    const TILE_SIZE_MAX = 30; /* 格子最大值（PC大屏上限） */
    let PLAYER_RADIUS = TILE_SIZE * 0.4;
    const PLAYER_SPEED = 180;

    const LEVELS = [
      { cols: 11, rows: 11, time: 30 },
      { cols: 15, rows: 15, time: 45 },
      { cols: 19, rows: 19, time: 60 }
    ];
    let currentLevelIndex = 0;
    let mapData = [];
    let mapOffsetX = 0;
    let mapOffsetY = 0;

    /* 动态计算 TILE_SIZE，根据画布显示尺寸和当前关卡地图大小自适应 */
    function calculateTileSize() {
      const level = LEVELS[currentLevelIndex];
      const displayWidth = canvas.clientWidth;
      const displayHeight = canvas.clientHeight;
      const tileByWidth = Math.floor(displayWidth / level.cols);
      const tileByHeight = Math.floor(displayHeight / level.rows);
      const calculated = Math.min(tileByWidth, tileByHeight);
      TILE_SIZE = Math.max(TILE_SIZE_MIN, Math.min(TILE_SIZE_MAX, calculated));
      PLAYER_RADIUS = TILE_SIZE * 0.4;
    }

    function updateMapOffsets() {
      const level = LEVELS[currentLevelIndex];
      const mapWidth = level.cols * TILE_SIZE;
      const mapHeight = level.rows * TILE_SIZE;
      mapOffsetX = Math.round((canvas.width - mapWidth) / 2);
      mapOffsetY = Math.round((canvas.height - mapHeight) / 2);
      mapOffsetX = Math.max(0, mapOffsetX);
      mapOffsetY = Math.max(0, mapOffsetY);
    }
    const fixedMazeMaps = [

        ["#","#","#","#","#","#","#","#","#","#","#"],

        ["#"," ","#","#","#","#","#"," ","#"," ","#"],

        ["#","#","#","#","#","#","#","#","#","#","#","#","#","#","#"],
        ["#"," "," "," "," "," "," "," ","#"," "," "," "," "," ","#"],
        ["#","#","#","#","#","#","#"," ","#"," ","#","#","#"," ","#"],
        ["#"," "," "," "," "," ","#"," ","#"," ","#"," "," "," ","#"],
        ["#"," ","#","#","#","#","#"," ","#","#","#"," ","#"," ","#"],
        ["#"," ","#"," "," "," "," "," ","#"," "," "," ","#"," ","#"],
        ["#"," ","#"," ","#","#","#","#","#"," ","#","#","#","#","#"],
        ["#"," "," "," ","#"," "," "," ","#"," "," "," "," "," ","#"],
        ["#"," ","#","#","#"," ","#"," ","#","#","#","#","#"," ","#"],
        ["#"," ","#"," "," "," ","#"," "," "," "," "," ","#"," ","#"],
        ["#"," ","#"," ","#"," ","#","#","#","#","#"," ","#"," ","#"],
        ["#"," ","#"," ","#"," "," "," ","#"," ","#"," "," "," ","#"],

        ["#"," "," "," "," "," "," "," ","#"," "," "," "," "," ","#"],
        ["#","#","#","#","#","#","#","#","#","#","#","#","#","#","#"]
      ],
      [
        ["#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#"],
        ["#"," ","#"," "," "," "," "," "," "," "," "," "," "," "," ","#"," "," "," ","#"],
        ["#"," ","#","#","#"," ","#","#","#","#","#","#","#"," ","#"," ","#"," ","#"],
        ["#"," "," "," ","#"," "," "," "," "," "," "," ","#"," ","#"," ","#"," ","#"],
        ["#","#","#"," ","#"," ","#","#","#","#","#"," ","#"," ","#"," ","#"," ","#"],
        ["#"," "," "," ","#"," "," "," "," "," ","#"," ","#"," ","#"," ","#"," ","#"],
        ["#"," ","#","#","#"," ","#","#","#","#","#"," ","#","#","#"," ","#"," ","#"],
        ["#"," ","#"," "," "," ","#"," "," "," ","#"," "," "," "," "," "," ","#"," ","#"],
        ["#"," ","#","#","#","#","#"," ","#"," ","#","#","#","#","#"," ","#"," ","#"],

        ["#"," ","#"," ","#","#","#","#","#","#","#","#","#"," ","#","#","#"," ","#"],
        ["#"," ","#"," ","#"," "," "," ","#"," "," "," ","#"," ","#"," "," "," ","#"],
        ["#"," ","#"," ","#"," ","#"," ","#"," ","#"," ","#"," ","#"," ","#"," ","#"],
        ["#"," ","#"," ","#"," ","#"," "," "," ","#"," "," "," ","#"," ","#"," ","#"],
        ["#"," ","#"," ","#"," ","#","#","#","#","#","#","#","#","#"," ","#","#","#"],
        ["#"," "," "," ","#"," ","#"," "," "," "," "," "," "," ","#"," "," "," "," ","#"],
        ["#","#","#","#","#"," ","#"," ","#","#","#","#","#"," ","#","#","#"," ","#"],
        ["#"," "," "," "," "," "," "," ","#"," "," "," "," "," "," "," "," "," "," ","#"],
        ["#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#","#"]
      ]
    ];
    let player = { x: 0, y: 0 };
    let goal = { x: 0, y: 0 };
    let keyboardState = { up: false, down: false, left: false, right: false };
    let pointerTarget = null;
    let pointerActive = false;
    let lampPointerPos = null; /* lamp 图标跟随的指针位置（鼠标/触摸） */
    let usingTouchLamp = false; /* 实时判断当前是否为触摸交互，不依赖设备检测 */
    let isPlaying = false;
    let gameWon = false;
    let gameLost = false;
    let levelTransitioning = false;
    let timeLeft = 0;
    let lastTime = 0;
    let totalElapsedTime = 0;
    const timerDisplay = document.getElementById('timerDisplay');
    const levelDisplay = document.getElementById('levelDisplay');
    const timeValue = document.getElementById('timeValue');
    const messageOverlay = document.getElementById('messageOverlay');
    const messageText = document.getElementById('messageText');
    const restartButton = document.getElementById('restartButton');
    const endScreen = document.getElementById('endScreen');
    const discordButton = document.getElementById('discordButton');
    const totalTimeDisplay = document.getElementById('totalTimeDisplay');
    const tipOverlay = document.getElementById('tipOverlay');
    const tipText = document.getElementById('tipText');
    const DISCORD_LINK = 'https://discord.com/channels/611028792911200256/1521094395108130867';
    function resizeRainCanvas() {
      rainCanvas.width = window.innerWidth;
      rainCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeRainCanvas);
    resizeRainCanvas();

    /* 手机端画布显示尺寸动态计算：仅改 CSS 显示尺寸，不改 canvas 内部分辨率 */
    function resizeGameCanvas() {
      const isMobile = window.innerWidth <= 768;
      if (isMobile) {
        const w = window.innerWidth * 1.7; /* 手机端放大系数：改这个数字即可线性调整画布大小（如 1.5/1.7/1.8/2.0） */
        canvas.style.setProperty('width', w + 'px', 'important');
        canvas.style.setProperty('height', (w * canvas.height / canvas.width) + 'px', 'important');
        canvas.style.setProperty('max-width', 'none', 'important');
        canvas.style.setProperty('max-height', 'none', 'important');
      } else {
        canvas.style.removeProperty('width');
        canvas.style.removeProperty('height');
        canvas.style.removeProperty('max-width');
        canvas.style.removeProperty('max-height');
        canvas.style.width = '';
        canvas.style.height = '';
      }
    }
    window.addEventListener('resize', resizeGameCanvas);
    window.addEventListener('orientationchange', resizeGameCanvas);
    resizeGameCanvas();

    const assetSources = {
      player: 'images/note.png',
      treasure: 'images/coin.png',
      coinChest: 'images/coin_chest.png', /* 【优化2】宝藏图标：images/coin_chest.png */
      goal: 'images/gate.png',
      wall: 'images/wall.png',
      cursor: 'images/lamp.png'
    };
    const assets = {};
    let assetsReady = false;
    const coinRainParticles = [];
    const COIN_RAIN_SIZE = 16; /* 铜板雨统一尺寸，约为游戏宝藏铜钱的一半 */
    let lastRainTime = 0;

    function preloadAssets() {
      const promises = Object.entries(assetSources).map(([key, src]) => {
        const img = new Image();
        assets[key] = img;
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = () => {
            console.error('Failed to load asset:', src);
            resolve();
          };
          img.src = src;
        });
      });
      Promise.all(promises).then(() => {
        assetsReady = true;
        startButton.disabled = false;
        startButton.style.opacity = '1';
        startButton.style.pointerEvents = 'auto';
        setCustomCursor();
        initCoinRain();
        requestAnimationFrame(rainLoop);
      });
    }

    function setCustomCursor() {
      const cursorImg = assets.cursor;
      if (!cursorImg || !cursorImg.complete) return;
      const maxSize = 40; /* 【优化3】光标尺寸：40px（原 32px），可按需微调 */
      const ratio = Math.min(maxSize / cursorImg.naturalWidth, maxSize / cursorImg.naturalHeight, 1);
      const width = Math.round(cursorImg.naturalWidth * ratio);
      const height = Math.round(cursorImg.naturalHeight * ratio);
      const buffer = document.createElement('canvas');
      buffer.width = width;
      buffer.height = height;
      const bufferCtx = buffer.getContext('2d');
      bufferCtx.clearRect(0, 0, width, height);
      bufferCtx.drawImage(cursorImg, 0, 0, width, height);
      const dataUrl = buffer.toDataURL('image/png');
      const cursorValue = `url(${dataUrl}) ${Math.floor(width / 2)} ${Math.floor(height / 2)}, auto`;
      document.body.style.cursor = cursorValue;
      canvas.style.cursor = cursorValue;
    }

    startButton.disabled = true;
    startButton.style.opacity = '0.5';
    startButton.style.pointerEvents = 'none';
    preloadAssets();
    const treasurePositions = [
      { row: 3, col: 3 },
      { row: 11, col: 3 },
      { row: 13, col: 17 }
    ];
    let treasureCollected = false;
    let treasurePos = null;
    let pauseLevelTimer = false;
    let goalHintLocked = false;
    let tipTimeoutId = null;

    function showEndScreen() {
      gameScreen.classList.add('hidden');
      const formatted = formatTotalTime(totalElapsedTime);
      totalTimeDisplay.textContent = 'Total Time: ' + formatted;
      endScreen.classList.remove('hidden');
    }

    function loadMap() {
      const level = LEVELS[currentLevelIndex];
      const cols = level.cols;
      const rows = level.rows;
      if (!fixedMazeMaps[currentLevelIndex]) {
        throw new Error('Maze data not initialized for level ' + currentLevelIndex);
      }
      mapData = fixedMazeMaps[currentLevelIndex].map(row => row.slice());
      calculateTileSize();
      updateMapOffsets();
      treasureCollected = false;
      treasurePos = treasurePositions[currentLevelIndex];
      if (!treasurePos) {
        throw new Error('Treasure position not defined for level ' + currentLevelIndex);
      }
      const startX = 1;
      const startY = 1;
      const endX = cols - 2;
      const endY = rows - 2;
      player.x = startX * TILE_SIZE + TILE_SIZE / 2;
      player.y = startY * TILE_SIZE + TILE_SIZE / 2;
      goal.x = endX * TILE_SIZE + TILE_SIZE / 2;
      goal.y = endY * TILE_SIZE + TILE_SIZE / 2;
      mapData[startY][startX] = ' ';
      mapData[endY][endX] = ' ';
    }

    function startGame() {
      startScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      resizeGameCanvas(); /* 画面可见后重新计算画布尺寸，此时 getBoundingClientRect 才有效 */
      messageOverlay.classList.add('hidden');
      currentLevelIndex = 0;
      totalElapsedTime = 0;
      loadMap();
      isPlaying = true;
      gameWon = false;
      gameLost = false;
      timeLeft = LEVELS[currentLevelIndex].time;
      updateTimerDisplay();
      updateLevelDisplay();
      pointerTarget = null;
      pointerActive = false;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    }

    function gameLoop(timestamp) {
      if (!isPlaying) return;
      const delta = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      totalElapsedTime += delta;
      updatePlayer(delta);
      updateTimer(delta);
      updateCoinRain(delta);
      render();
      renderCoinRain();
      if (!gameWon && !gameLost) requestAnimationFrame(gameLoop);
    }

    function updatePlayer(delta) {
      if (gameWon || levelTransitioning) return;
      const move = { x: 0, y: 0 };
      if (keyboardState.up) move.y -= 1;
      if (keyboardState.down) move.y += 1;
      if (keyboardState.left) move.x -= 1;
      if (keyboardState.right) move.x += 1;
      if (pointerActive && pointerTarget) {
        const dx = pointerTarget.x - player.x;
        const dy = pointerTarget.y - player.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 4) {
          move.x += dx / distance;
          move.y += dy / distance;
        }
      }

      if (move.x !== 0 || move.y !== 0) {
        const length = Math.hypot(move.x, move.y);
        const vx = (move.x / length) * PLAYER_SPEED;
        const vy = (move.y / length) * PLAYER_SPEED;
        const nextX = player.x + vx * delta;
        const nextY = player.y + vy * delta;
        const resolved = resolveCollision(nextX, nextY);
        player.x = resolved.x;
        player.y = resolved.y;
      }

      if (!treasureCollected) {
        checkTreasureCollection();
      }

      const atGoal = checkGoalReached();
      if (atGoal) {
        if (!treasureCollected) {
          if (!goalHintLocked) {
            showTipMessage('', 2000, 'tipImageNoTreasure'); /* 【优化2】未找到宝藏提示 */
            goalHintLocked = true;
          }
          return;
        }
        if (currentLevelIndex < LEVELS.length - 1) {
          levelTransitioning = true;
          showTipMessage('', 2000, 'tipImageWin'); /* 【优化1】使用图片显示通关提示 */
          setTimeout(() => {
            currentLevelIndex += 1;
            loadMap();
            timeLeft = LEVELS[currentLevelIndex].time;
            updateTimerDisplay();
            updateLevelDisplay();
            pointerTarget = null;
            pointerActive = false;
            levelTransitioning = false;
          }, 2000);
        } else {
          gameWon = true;
          isPlaying = false;
          showEndScreen();
        }
      } else {
        goalHintLocked = false;
      }
    }

    function updateTimer(delta) {
      if (gameWon || gameLost || pauseLevelTimer) return;
      timeLeft -= delta;
      if (timeLeft <= 0) {
        timeLeft = 0;
        gameLost = true;
        isPlaying = false;
        showMessage('Challenge Failed');
      }
      updateTimerDisplay();
    }

    function updateTimerDisplay() {
      timeValue.textContent = Math.ceil(timeLeft) + ' s until darkness...';
    }

    function updateLevelDisplay() {
      levelDisplay.textContent = 'Level ' + (currentLevelIndex + 1);
    }

    function checkTreasureCollection() {
      if (!treasurePos || treasureCollected) return;
      const treasureX = treasurePos.col * TILE_SIZE + TILE_SIZE / 2;
      const treasureY = treasurePos.row * TILE_SIZE + TILE_SIZE / 2;
      const distance = Math.hypot(player.x - treasureX, player.y - treasureY);
      if (distance < PLAYER_RADIUS + TILE_SIZE * 0.35) {
        treasureCollected = true;
        timeLeft += 10;
        showTipMessage('', 3000, 'tipImageFound'); /* 【优化2】找到宝藏提示 */
      }
    }

    function showTipMessage(text, duration = 2000, imageId = null) {
      if (tipTimeoutId) {
        clearTimeout(tipTimeoutId);
      }
      pauseLevelTimer = true;
      const tipImages = document.querySelectorAll('.tip-popup-img');
      const tipBox = document.getElementById('tipBox');
      
      tipImages.forEach(img => img.style.display = 'none');
      
      if (imageId) {
        const targetImg = document.getElementById(imageId);
        if (targetImg) {
          targetImg.style.display = 'block';
        }
        tipBox.style.display = 'none';
      } else {
        tipBox.style.display = 'block';
        tipText.innerHTML = text;
      }
      tipOverlay.classList.remove('hidden');
      tipTimeoutId = setTimeout(() => {
        tipOverlay.classList.add('hidden');
        pauseLevelTimer = false;
        tipTimeoutId = null;
      }, duration);
    }

    function formatTotalTime(seconds) {
      const totalSeconds = Math.round(seconds);
      const minutes = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return minutes > 0 ? `${minutes} min ${secs} s` : `${secs} s`;
    }

    function showMessage(text) {
      const failImage = document.getElementById('failImage');
      const failBox = document.getElementById('failBox');
      if (failImage) {
        failImage.style.display = 'block';
        failBox.style.display = 'none';
      } else {
        messageText.textContent = text;
      }
      messageOverlay.classList.remove('hidden');
    }

    function hideTipOverlay() {
      if (tipTimeoutId) {
        clearTimeout(tipTimeoutId);
        tipTimeoutId = null;
      }
      tipOverlay.classList.add('hidden');
      pauseLevelTimer = false;
    }

    function resolveCollision(nextX, nextY) {
      let x = player.x;
      let y = player.y;
      if (canMoveTo(nextX, player.y)) x = nextX;
      if (canMoveTo(x, nextY)) y = nextY;
      return { x, y };
    }

    function canMoveTo(cx, cy) {
      for (let y = 0; y < mapData.length; y++) {
        for (let x = 0; x < mapData[y].length; x++) {
          if (mapData[y][x] !== '#') continue;
          const rect = {
            left: x * TILE_SIZE,
            top: y * TILE_SIZE,
            right: x * TILE_SIZE + TILE_SIZE,
            bottom: y * TILE_SIZE + TILE_SIZE
          };
          const closestX = Math.max(rect.left, Math.min(cx, rect.right));
          const closestY = Math.max(rect.top, Math.min(cy, rect.bottom));
          const distance = Math.hypot(cx - closestX, cy - closestY);
          if (distance < PLAYER_RADIUS) {
            return false;
          }
        }
      }
      return true;
    }

    function checkGoalReached() {
      const distance = Math.hypot(player.x - goal.x, player.y - goal.y);
      return distance < PLAYER_RADIUS + TILE_SIZE * 0.35;
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#031e27';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      renderMaze();
      renderCoinRain();
      renderTreasure();
      renderGoal();
      renderPlayer();
      renderLamp();
      renderFogOverlay();
      if (gameWon) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        ctx.fillRect(0, 240, 800, 120);
        ctx.fillStyle = '#f5e87a';
        ctx.font = 'bold 56px "SourceHanSans"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Level Cleared!', 400, 300);
      }
    }

    /* ---------- 占位图形绘制区域 ----------
       下面各函数集中绘制游戏中的几何形状，
       方便以后替换为真实素材。 */
    function renderMaze() {
      for (let y = 0; y < mapData.length; y++) {
        for (let x = 0; x < mapData[y].length; x++) {
          const px = x * TILE_SIZE + mapOffsetX;
          const py = y * TILE_SIZE + mapOffsetY;
          if (mapData[y][x] === '#') {
            drawWall(px, py, TILE_SIZE, TILE_SIZE);
          } else {
            drawFloor(px, py, TILE_SIZE, TILE_SIZE);
          }
        }
      }
    }

    function renderPlayer() {
      drawPlayer(player.x + mapOffsetX, player.y + mapOffsetY, PLAYER_RADIUS);
    }

    function renderLamp() {
      try {
        if (!isPlaying || !lampPointerPos || !usingTouchLamp) return;
        
        const lampImg = assets.cursor;
        if (!lampImg || !lampImg.complete) return;
        
        const lampSize = TILE_SIZE * 0.8;
        const lampX = lampPointerPos.x + mapOffsetX - lampSize / 2;
        let lampY = lampPointerPos.y + mapOffsetY - lampSize / 2;
        
        if (lampY < 0) lampY = 0;
        if (lampY + lampSize > canvas.height) lampY = canvas.height - lampSize;
        if (lampX < 0) lampX = 0;
        if (lampX + lampSize > canvas.width) lampX = canvas.width - lampSize;
        
        ctx.drawImage(lampImg, lampX, lampY, lampSize, lampSize);
      } catch (e) {
        // 错误隔离：即使 lamp 绘制出错，也不影响游戏主循环
        console.warn('renderLamp error:', e);
      }
    }

    function renderGoal() {
      drawGoal(goal.x + mapOffsetX, goal.y + mapOffsetY, TILE_SIZE * 0.7);
    }

    function drawFloor(x, y, width, height) {
      ctx.fillStyle = '#083644';
      ctx.fillRect(x, y, width, height);
    }

    function drawWall(x, y, width, height) {
      const wallImg = assets.wall;
      if (wallImg && wallImg.complete) {
        drawImageFit(wallImg, x, y, width, height);
      } else {
        ctx.fillStyle = '#1b5d6f';
        ctx.fillRect(x, y, width, height);
        ctx.strokeStyle = '#0b3d4a';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, width - 2, height - 2);
      }
    }

    function drawImageFit(img, x, y, maxWidth, maxHeight) {
      if (!img || !img.complete) return;
      const ratio = Math.min(maxWidth / img.naturalWidth, maxHeight / img.naturalHeight);
      const width = img.naturalWidth * ratio;
      const height = img.naturalHeight * ratio;
      const offsetX = x + (maxWidth - width) / 2;
      const offsetY = y + (maxHeight - height) / 2;
      ctx.drawImage(img, offsetX, offsetY, width, height);
    }

    function initCoinRain() {
      coinRainParticles.length = 0;
      const count = 18;
      for (let i = 0; i < count; i++) {
        coinRainParticles.push(createCoinParticle());
      }
    }

    function createCoinParticle() {
      return {
        x: Math.random() * (rainCanvas.width - COIN_RAIN_SIZE),
        y: Math.random() * -rainCanvas.height,
        size: COIN_RAIN_SIZE,
        speed: 40 + Math.random() * 80,
        alpha: 0.4 + Math.random() * 0.45,
        angle: Math.random() * Math.PI * 2,
        angularSpeed: (Math.random() - 0.5) * 2,
        swingPhase: Math.random() * Math.PI * 2,
        swingWidth: 20 + Math.random() * 20
      };
    }

    function updateCoinRain(delta) {
      if (!coinRainParticles.length) return;
      for (const particle of coinRainParticles) {
        particle.y += particle.speed * delta;
        particle.angle += particle.angularSpeed * delta;
        particle.x += Math.cos(particle.swingPhase + particle.y * 0.02) * (particle.swingWidth * delta);
        if (particle.y > rainCanvas.height + particle.size) {
          particle.y = -particle.size;
          particle.x = Math.random() * (rainCanvas.width - particle.size);
          particle.speed = 40 + Math.random() * 80;
          particle.alpha = 0.4 + Math.random() * 0.45;
          particle.swingPhase = Math.random() * Math.PI * 2;
          particle.swingWidth = 20 + Math.random() * 20;
          particle.angularSpeed = (Math.random() - 0.5) * 2;
        }
      }
    }

    function renderCoinRain() {
      const coinImg = assets.treasure;
      if (!coinImg || !coinImg.complete) return;
      rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
      rainCtx.save();
      for (const particle of coinRainParticles) {
        rainCtx.globalAlpha = particle.alpha;
        rainCtx.translate(particle.x + particle.size / 2, particle.y + particle.size / 2);
        rainCtx.rotate(particle.angle);
        drawImageFitToContext(rainCtx, coinImg, -particle.size / 2, -particle.size / 2, particle.size, particle.size);
        rainCtx.setTransform(1, 0, 0, 1, 0, 0);
      }
      rainCtx.restore();
    }

    function rainLoop(timestamp) {
      const delta = lastRainTime ? (timestamp - lastRainTime) / 1000 : 0;
      lastRainTime = timestamp;
      updateCoinRain(delta);
      renderCoinRain();
      requestAnimationFrame(rainLoop);
    }

    function drawImageFitToContext(ctxTarget, img, x, y, maxWidth, maxHeight) {
      if (!img || !img.complete) return;
      const ratio = Math.min(maxWidth / img.naturalWidth, maxHeight / img.naturalHeight);
      const width = img.naturalWidth * ratio;
      const height = img.naturalHeight * ratio;
      const offsetX = x + (maxWidth - width) / 2;
      const offsetY = y + (maxHeight - height) / 2;
      ctxTarget.drawImage(img, offsetX, offsetY, width, height);
    }

    function renderFogOverlay() {
      const radius = TILE_SIZE * 4;
      const centerX = player.x + mapOffsetX;
      const centerY = player.y + mapOffsetY;
      const gradient = ctx.createRadialGradient(centerX, centerY, radius * 0.2, centerX, centerY, radius);
      gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
      gradient.addColorStop(0.6, 'rgba(0, 0, 0, 0.7)');
      gradient.addColorStop(1, 'rgba(0, 0, 0, 0.95)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawPlayer(cx, cy, radius) {
      const playerImg = assets.player;
      if (playerImg && playerImg.complete) {
        drawImageFit(playerImg, cx - radius, cy - radius, radius * 2, radius * 2);
      } else {
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = '#f7d14b';
        ctx.fill();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#ffd460';
        ctx.stroke();
      }
    }

    function drawGoal(cx, cy, size) {
      const half = size / 2;
      const goalImg = assets.goal;
      if (goalImg && goalImg.complete) {
        drawImageFit(goalImg, cx - half, cy - half, size, size);
      } else {
        ctx.fillStyle = '#72c6ff';
        ctx.fillRect(cx - half, cy - half, size, size);
        ctx.strokeStyle = '#d7f6ff';
        ctx.lineWidth = 4;
        ctx.strokeRect(cx - half, cy - half, size, size);
      }
    }

    function renderTreasure() {
      if (!treasurePos || treasureCollected) return;
      const cx = treasurePos.col * TILE_SIZE + TILE_SIZE / 2 + mapOffsetX;
      const cy = treasurePos.row * TILE_SIZE + TILE_SIZE / 2 + mapOffsetY;
      drawTreasure(cx, cy, TILE_SIZE * 0.6);
    }

    function drawTreasure(cx, cy, size) {
      const treasureImg = assets.coinChest; /* 【优化2】使用 coin_chest.png 作为宝藏图标 */
      const half = size / 2;
      if (treasureImg && treasureImg.complete) {
        drawImageFit(treasureImg, cx - half, cy - half, size, size);
      } else {
        ctx.beginPath();
        ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
        ctx.fillStyle = '#ffbf00';
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#ff7b00';
        ctx.stroke();
      }
    }
    /* ---------- 占位图形绘制区域结束 ---------- */

    startButton.addEventListener('click', startGame);

    window.addEventListener('keydown', event => {
      if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') keyboardState.up = true;
      if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') keyboardState.down = true;
      if (event.key === 'ArrowLeft' || event.key === 'a' || event.key === 'A') keyboardState.left = true;
      if (event.key === 'ArrowRight' || event.key === 'd' || event.key === 'D') keyboardState.right = true;
    });

    window.addEventListener('keyup', event => {
      if (event.key === 'ArrowUp' || event.key === 'w' || event.key === 'W') keyboardState.up = false;
      if (event.key === 'ArrowDown' || event.key === 's' || event.key === 'S') keyboardState.down = false;
      if (event.key === 'ArrowLeft' || event.key === 'a' || event.key === 'A') keyboardState.left = false;
      if (event.key === 'ArrowRight' || event.key === 'd' || event.key === 'D') keyboardState.right = false;
    });

    function getCanvasPos(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const canvasX = (event.clientX - rect.left) * scaleX;
      const canvasY = (event.clientY - rect.top) * scaleY;
      return {
        x: canvasX - mapOffsetX,
        y: canvasY - mapOffsetY
      };
    }

    function startDrag(event) {
      if (event.button !== undefined && event.button !== 0) return;
      pointerActive = true;
      pointerTarget = getCanvasPos(event);
      try {
        if (event.pointerType === 'touch') {
          usingTouchLamp = true;
          lampPointerPos = getCanvasPos(event);
        } else {
          usingTouchLamp = false;
        }
      } catch (e) {
        console.warn('startDrag lamp init error:', e);
      }
    }

    restartButton.addEventListener('click', () => {
      messageOverlay.classList.add('hidden');
      loadMap();
      timeLeft = LEVELS[currentLevelIndex].time;
      updateTimerDisplay();
      gameWon = false;
      gameLost = false;
      isPlaying = true;
      pointerTarget = null;
      pointerActive = false;
      lastTime = performance.now();
      requestAnimationFrame(gameLoop);
    });

    function moveDrag(event) {
      if (!pointerActive) return;
      pointerTarget = getCanvasPos(event);
      if (event.pointerType === 'touch') {
        usingTouchLamp = true;
        lampPointerPos = getCanvasPos(event);
      }
    }

    function endDrag() {
      pointerActive = false;
      pointerTarget = null;
      /* lampPointerPos 保留在最后位置，不置 null */
    }

    canvas.addEventListener('pointerdown', startDrag);
    canvas.addEventListener('pointermove', moveDrag);
    window.addEventListener('pointerup', endDrag);

    // 手机端：阻止游戏画布上的触摸事件触发页面滚动
    canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
    canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

    discordButton.addEventListener('click', () => {
      window.open(DISCORD_LINK, '_blank');
    });
  </script>
</body>
</html>
